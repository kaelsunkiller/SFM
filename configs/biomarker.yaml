paths:
  data_root: ${SFM_DATA_ROOT}
  checkpoint_dir: ${SFM_CKPT_DIR}
  output_dir: ${SFM_OUTPUT_DIR}

experiment:
  task: biomarker
  output_subdir: biomarker

model:
  encoder: swin_base_patch4_window7_224
  head:
    input_dim: 1024
    hidden_dim: 512
    class_counts:
      eGFR: 5
      HbA1c: 3
      TG: 4
    dropout: 0.2
  pretrained_checkpoint: ${SFM_CKPT_DIR}/sfm_pretrained_checkpoint.pth

training:
  data_fraction_percent: 100
  num_steps: 20000
  train_batch_size: 64
  eval_batch_size: 512
  image_size: 224
  learning_rate: 1.0e-3
  warmup_steps: 400
  eval_every_steps: 10
  seed: 42
  freeze_backbone: false

optimizer:
  name: sgd
  momentum: 0.9
  weight_decay: 5.0e-4

loss:
  name: cross_entropy
